<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdn.plot.ly; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com; connect-src 'self' ws: wss:; img-src 'self' data: blob:; worker-src blob:;">
    <title>{% block title %}afmm_chat{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css?v={{ asset_v }}">
    {% block head %}{% endblock %}
</head>
<body>
    <!-- 전체 폭 KIST 레드 상단 띠 -->
    <div class="top-strip" role="presentation"></div>

    {% block content %}{% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/marked@14.1.3/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.7/dist/purify.min.js"></script>
    <script src="/static/js/app_state.js?v={{ asset_v }}"></script>
    <script src="/static/js/vs_viewer.js?v={{ asset_v }}"></script>
    <script src="/static/js/result_charts.js?v={{ asset_v }}"></script>
    <script src="/static/js/result_table.js?v={{ asset_v }}"></script>
    <script src="/static/js/chat.js?v={{ asset_v }}"></script>
    {% block scripts %}{% endblock %}
    <script>
        // JS 로드 오류 감지
        window.onerror = function(msg, src, line, col, err) {
            var el = document.getElementById('status-bar');
            if (el) el.textContent = 'JS 오류: ' + msg;
        };
    </script>
</body>
</html>
